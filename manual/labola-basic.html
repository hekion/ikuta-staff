<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LaBOLA 基本事項 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        .content-body { padding-left: 20px; margin-bottom: 30px; line-height: 1.8; color: #333; font-size: 0.95rem; border-left: 3px solid #eee; }
        .content-body ul, .content-body ol { margin: 0; padding-left: 1.2em; }
        .color-sample { display: inline-block; width: 110px; padding: 2px 8px; border-radius: 4px; color: #fff; font-weight: bold; text-align: center; margin-right: 10px; font-size: 0.85rem; }
        .important { color: #d9534f; font-weight: bold; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>LaBOLA 基本事項</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">更新日：2026/04/22</p>

            <section>
                <span class="category-title">LaBOLAの主な用途</span>
                <div class="content-body">
                    <ul>
                        <li>一般のお客様の施設利用予約</li>
                        <li>社員から依頼されたアカデミー・スクールの予約管理</li>
                        <li>個人参加プログラムの人数確認・予約管理</li>
                    </ul>
                </div>
            </section>

            <section>
                <span class="category-title">カレンダーの色別表示</span>
                <div class="content-body">
                    <p><span class="color-sample" style="background: #3399ff;">#3399ff</span> 川崎フロンターレアカデミー</p>
                    <p><span class="color-sample" style="background: #ff3300;">#ff3300</span> 個人参加</p>
                    <p><span class="color-sample" style="background: #33ccff;">#33ccff</span> 川崎フロンターレスクール</p>
                    <p style="margin-top: 10px; font-size: 0.9rem; color: #666;">※その他：一般予約、定期利用団体など</p>
                </div>
            </section>

            <section>
                <span class="category-title">予約ルールの基本</span>
                <div class="content-body">
                    予約開始日：利用日の <strong class="important">60日前（深夜 0:00〜）</strong><br>
                    <span class="important">※優先団体の予約が先に入っている場合があるため注意</span>
                </div>
            </section>

            <a href="./" class="back-btn">← マニュアル一覧に戻る</a>
        </div>
    </main>
</body>
</html>
