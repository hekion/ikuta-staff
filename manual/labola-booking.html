<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>予約の入れ方 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        .content-body { padding-left: 20px; margin-bottom: 30px; line-height: 1.8; color: #333; font-size: 0.95rem; border-left: 3px solid #eee; }
        .content-body ol { margin: 0; padding-left: 1.2em; }
        .alert-text { color: #d9534f; font-weight: bold; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>一般予約の受付手順</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">更新日：2026/04/22</p>

            <section>
                <span class="category-title">予約のステップ</span>
                <div class="content-body">
                    <ol>
                        <li>空き枠（「○」表示）を選択</li>
                        <li>会員確認（会員番号の有無を確認）</li>
                        <li>お客様情報の入力（名前、営利・非営利の区分など）</li>
                    </ol>
                </div>
            </section>

            <section>
                <span class="category-title">会員番号がある場合</span>
                <div class="content-body">
                    番号入力後、<strong>「会員データを読み込む」</strong>を押すと情報が自動反映されます。
                </div>
            </section>

            <section>
                <span class="category-title">情報の記録（メモと備考）</span>
                <div class="content-body">
                    <strong>■ メモ欄（スタッフ用）</strong><br>
                    スタッフ間の共有事項を記入。お客様には届きません。<br>
                    <span class="alert-text">※必ず「記入日」と「記入者名」を添えること。</span><br><br>
                    <strong>■ 備考欄（対外用）</strong><br>
                    お客様へのメールに反映されます。対外的な案内のみを記入。
                </div>
            </section>

            <a href="./" class="back-btn">← マニュアル一覧に戻る</a>
        </div>
    </main>
</body>
</html>
