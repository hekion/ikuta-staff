<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカデミー登録 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        
        .step-box { margin-bottom: 25px; border-left: 4px solid #35A0D9; padding-left: 15px; }
        .step-title { font-weight: bold; color: #35A0D9; margin-bottom: 8px; display: block; }
        .step-details { font-size: 0.95rem; line-height: 1.6; color: #333; margin-top: 5px; }

        .important-box { 
            background: #fdf2f2; 
            border: 1px solid #f5c6cb; 
            padding: 12px; 
            border-radius: 5px; 
            margin: 10px 0; 
            font-size: 0.9rem;
        }
        .important-label { color: #d9534f; font-weight: bold; display: block; margin-bottom: 3px; }
        
        .sub-step { list-style-type: decimal; margin-left: 20px; font-size: 0.9rem; color: #444; line-height: 1.6; margin-top: 5px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
        <nav class="nav-menu">
            <ul>
                <li><a href="../manual/">マニュアル</a></li>
                <li><a href="../setup/">準備物</a></li>
                <li><a href="../roster/">名簿</a></li>
                <li><a href="../inventory/">備品検索</a></li>
                <li><a href="../pop/">掲示物</a></li>
                <li><a href="../contacts/">連絡先</a></li>
            </ul>
        </nav>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>アカデミー・予約不可登録</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">更新日：2026/04/22</p>

            <section>
                <span class="category-title">予約不可枠の作成手順</span>
                <div class="step-box">
                    <div class="step-details">
                        <ol class="sub-step">
                            <li>画面右端の<strong>「予約不可作成」</strong>ボタンを押す</li>
                            <li>利用場所・日時が正しいか確認</li>
                            <li>「表示名」を入力し、適切な「表示色」を選択</li>
                            <li>備考欄に必要事項を記録する</li>
                        </ol>
                    </div>
                </div>

                <div class="important-box">
                    <span class="important-label">《記録ルール》</span>
                    <div class="step-details" style="font-size: 0.9rem;">
                        備考欄には必ず<strong>「記入日」</strong>と<strong>「記入者名」</strong>を記録してください。
                    </div>
                </div>
            </section>

            <a href="./" class="back-btn">← マニュアル一覧に戻る</a>
        </div>
    </main>

    <footer><p>&copy; 2026 FRONTOWN IKUTA</p></footer>
</body>
</html>
