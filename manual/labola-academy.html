<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アカデミー登録（予約不可） | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        .input-area { background: #f9f9f9; border: 1px solid #eee; padding: 15px; border-radius: 5px; font-size: 0.95rem; line-height: 1.6; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>アカデミー・予約不可枠の登録</h2>

            <section>
                <span class="category-title">作成手順</span>
                <div class="input-area">
                    <ol>
                        <li>画面右端にある<strong>「予約不可作成」</strong>ボタンをクリックする。</li>
                        <li><strong>「利用予定場所」</strong>と<strong>「日時」</strong>が正しいか、間違いがないか再確認する。</li>
                        <li><strong>「表示名」</strong>を入力する。</li>
                        <li><strong>「表示色」</strong>を選択する。（アカデミー：#3399ff、スクール：#33ccff など）</li>
                        <li><strong>「備考」</strong>欄に、記入した日付と記入者名を記入する。</li>
                    </ol>
                </div>
            </section>

            <a href="./" class="back-btn">← 一覧に戻る</a>
        </div>
    </main>
</body>
</html>
