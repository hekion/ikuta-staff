<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>共通業務 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        .step-box { margin-bottom: 25px; border-left: 4px solid #35A0D9; padding-left: 15px; }
        .step-title { font-weight: bold; color: #35A0D9; margin-bottom: 8px; display: block; }
        .input-area { background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 5px; min-height: 50px; font-size: 0.95rem; line-height: 1.6; color: #333; margin-top: 5px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>早番＆遅番共通業務</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">更新日：2026/04/22</p>

            <section>
                <span class="category-title">◯内勤</span>
                <div class="step-box"><span class="step-title">タイムテーブル作成</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">忘れ物処理</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">退館十分前アナウンス</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">洗濯物取り込み</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">コート入れ替え確認</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">バナー、ポップ、ネット修理</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">電話対応</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">宅配対応</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">ラミネート作業</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">アイシングの氷わたす</span><div class="input-area"></div></div>
                <div class="step-box"><span class="step-title">ゴミ捨て</span><div class="input-area"></div></div>
            </section>

            <a href="./" class="back-btn">← マニュアル一覧に戻る</a>
        </div>
    </main>

    <footer><p>&copy; 2026 FRONTOWN IKUTA</p></footer>
</body>
</html>
