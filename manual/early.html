<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>早番業務 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .manual-content { background: #fff; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .category-title { font-size: 1.1rem; font-weight: bold; background: #35A0D9; color: #fff; padding: 5px 15px; border-radius: 20px; display: inline-block; margin: 20px 0 15px 0; }
        .step-box { margin-bottom: 25px; border-left: 4px solid #35A0D9; padding-left: 15px; }
        .step-title { font-weight: bold; color: #35A0D9; margin-bottom: 8px; display: block; }
        .input-area { background: #f9f9f9; border: 1px solid #eee; padding: 10px; border-radius: 5px; min-height: 50px; font-size: 0.95rem; line-height: 1.6; color: #333; margin-top: 5px; }
        .back-btn { display: inline-block; margin-top: 20px; color: #35A0D9; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
    </div>

    <main class="container">
        <div class="manual-content">
            <h2>早番業務について</h2>
            <p style="font-size: 0.85rem; color: #666; margin-bottom: 20px;">更新日：2026/04/22</p>

            <section>
                <span class="category-title">◯鍵開け</span>
                
                <div class="step-box">
                    <span class="step-title">ALSOK解除</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">シャワー元電源オン</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">自動ドア開ける</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">トイレを開ける</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">トーカン出入り口開ける</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">ポスターなどの掲示物を外に出す</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">更衣室準備</span>
                    <div class="input-area">
                        ・鍵開け<br>
                        ・シャワー出し<br>
                        ・電気、換気扇、空気清浄機、エアコンつける<br>
                        ・仕切りのロック確認
                    </div>
                </div>

                <div class="step-box">
                    <span class="step-title">コーヒーマシンのセッティング</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">パソコン(新)をつけてサイネージに繋ぐ</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">外回り(ゴミ箱確認)</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">フィットネス準備</span>
                    <div class="input-area"></div>
                </div>

                <div class="step-box">
                    <span class="step-title">遅番からの連絡確認</span>
                    <div class="input-area"></div>
                </div>
            </section>

            <a href="./" class="back-btn">← マニュアル一覧に戻る</a>
        </div>
    </main>

    <footer><p>&copy; 2026 FRONTOWN IKUTA</p></footer>
</body>
</html>
