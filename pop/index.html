<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示物 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>

        <nav class="nav-menu">
            <ul>
                <li><a href="../manual/">マニュアル</a></li>
                <li><a href="../setup/">準備物</a></li>
                <li><a href="../roster/">名簿</a></li>
                <li><a href="../inventory/">備品検索</a></li>
                <li><a href="../pop/">掲示物</a></li>
                <li><a href="../contacts/">連絡先</a></li>
            </ul>
        </nav>
    </div>

    <main class="container">
        <section>
            <h2>POP・掲示物データ</h2>
            <p style="font-size: 0.9rem; margin-bottom: 20px;">印刷用のPOPデータ（Googleドライブ）へのリンクです。</p>
            
            <div class="grid">
                <a href="https://drive.google.com/drive/folders/YOUR_DRIVE_ID" target="_blank" rel="noopener noreferrer" class="card" style="grid-column: 1 / -1; background: #eef7ff; border: 2px dashed #35A0D9;">
                    <div class="icon">📂</div>
                    <strong style="color: #35A0D9;">POP共有フォルダ全体を開く</strong>
                </a>

                <a href="#" class="card">
                    <div class="icon">📢</div>
                    <span>本日の案内・タイムテーブル</span>
                </a>

                <a href="#" class="card">
                    <div class="icon">🌂</div>
                    <span>忘れ物・落とし物案内</span>
                </a>

                <a href="#" class="card">
                    <div class="icon">⚠️</div>
                    <span>注意喚起・禁止事項</span>
                </a>

                <a href="#" class="card">
                    <div class="icon">🧧</div>
                    <span>キャンペーン・イベント</span>
                </a>
            </div>

            <div class="memo-box" style="margin-top: 30px; background: #fff; padding: 15px; border-radius: 10px; font-size: 0.85rem; color: #666; border: 1px solid #eee;">
                <strong>💡 運用ルール</strong>
                <ul style="margin: 10px 0 0 18px;">
                    <li>新しく作成したPOPは必ず共通フォルダへ格納してください。</li>
                    <li>掲示期間が終了したものは「アーカイブ」フォルダへ移動。</li>
                </ul>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 FRONTOWN IKUTA</p>
    </footer>

</body>
</html>
