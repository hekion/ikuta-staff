<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <script src="../auth.js"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>掲示物 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        #filter-container { margin-bottom: 20px; display: flex; flex-wrap: wrap; gap: 8px; }
        .filter-btn { 
            padding: 6px 15px; border: 1px solid #35A0D9; background: #fff; 
            color: #35A0D9; border-radius: 20px; cursor: pointer; font-size: 0.85rem; transition: 0.2s;
        }
        .filter-btn.active { background: #35A0D9; color: #fff; }
        
        #pop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .pop-card { 
            background: #fff; border-radius: 10px; overflow: hidden; 
            border: 1px solid #eee; transition: 0.2s; text-decoration: none; color: inherit; display: block;
        }
        .pop-card:hover { transform: translateY(-3px); box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-color: #35A0D9; }
        
        .pop-card-thumb { 
            height: 150px; background: #f0f7ff; overflow: hidden;
            display: flex; align-items: center; justify-content: center;
        }
        .pop-card-thumb img { width: 100%; height: 100%; object-fit: cover; }
        .pop-card-thumb .no-img { font-size: 2.5rem; }
        
        .pop-card-info { padding: 10px; border-top: 1px solid #eee; }
        .pop-card-title { font-size: 0.85rem; font-weight: bold; display: block; margin-bottom: 4px; }
        
        /* カテゴリラベルを表示するエリア */
        .cat-tags { display: flex; flex-wrap: wrap; gap: 4px; }
        .pop-card-cat { font-size: 0.65rem; color: #35A0D9; background: #eef7ff; padding: 1px 6px; border-radius: 4px; }
        
        #loading { text-align: center; padding: 30px; color: #999; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
        <nav class="nav-menu">
            <ul>
                <li><a href="../manual/">マニュアル</a></li>
                <li><a href="../setup/">準備物</a></li>
                <li><a href="../roster/">名簿</a></li>
                <li><a href="../inventory/">備品検索</a></li>
                <li><a href="../pop/">掲示物</a></li>
                <li><a href="../contacts/">連絡先</a></li>
            </ul>
        </nav>
    </div>

    <main class="container">
        <section>
            <h2>掲示物・POP作成データ</h2>
            <div id="filter-container">
                <button class="filter-btn active" onclick="filterPop('すべて', this)">すべて</button>
            </div>
            <div id="loading">データを読み込み中...</div>
            <div id="pop-grid"></div>
        </section>
    </main>

    <footer><p>© 2026 FRONTOWN IKUTA</p></footer>

    <script>
        const API_KEY = 'AIzaSyDecF0oQvA5i82U8dZR66YOQ_QdRPxGEOY'; 
        const SPREADSHEET_ID = '1Fh4Z7f7Jau8d_FMT__sGjp-99Ks-IHKQl5kaGERM2Rg';
        const RANGE = '掲示物!A2:C100';

        let allData = [];

        async function loadData() {
            try {
                const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(RANGE)}?key=${API_KEY}`;
                const res = await fetch(url);
                const json = await res.json();
                if (!json.values) return;

                allData = json.values.map(row => {
                    const link = row[2] || '';
                    const categories = row[1] ? row[1].split(',').map(s => s.trim()) : ['未分類'];
                    let thumbUrl = '';
                    
                    if (link.includes('drive.google.com')) {
                        const fileId = link.match(/\/d\/([^/]+)/);
                        if (fileId && fileId[1]) {
                            thumbUrl = `https://drive.google.com/thumbnail?id=${fileId[1]}&sz=w400`;
                        }
                    }

                    return {
                        name: row[0],
                        categories: categories, // 配列として保持
                        link: link,
                        thumb: thumbUrl
                    };
                });

                createFilterButtons();
                renderCards('すべて');
                document.getElementById('loading').classList.add('hidden');
            } catch (e) { console.error(e); }
        }

        function createFilterButtons() {
            const container = document.getElementById('filter-container');
            // すべてのカテゴリをバラバラにして重複を消す
            const flatCats = allData.flatMap(d => d.categories);
            const uniqueCats = [...new Set(flatCats)];
            
            uniqueCats.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn';
                btn.innerText = cat;
                btn.onclick = (e) => filterPop(cat, e.target);
                container.appendChild(btn);
            });
        }

        function filterPop(target, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderCards(target);
        }

        function renderCards(target) {
            const grid = document.getElementById('pop-grid');
            grid.innerHTML = '';
            
            // カテゴリ配列のなかに選択したカテゴリが含まれているかチェック
            const filtered = target === 'すべて' 
                ? allData 
                : allData.filter(d => d.categories.includes(target));

            filtered.forEach(item => {
                const card = document.createElement('a');
                card.className = 'pop-card';
                card.href = item.link;
                card.target = '_blank';
                
                const thumbContent = item.thumb 
                    ? `<img src="${item.thumb}" alt="preview">` 
                    : `<div class="no-img">📄</div>`;
                
                // カード内のタグ表示用
                const tagsHtml = item.categories.map(c => `<span class="pop-card-cat">${c}</span>`).join('');

                card.innerHTML = `
                    <div class="pop-card-thumb">${thumbContent}</div>
                    <div class="pop-card-info">
                        <span class="pop-card-title">${item.name}</span>
                        <div class="cat-tags">${tagsHtml}</div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        loadData();
    </script>
</body>
</html>
