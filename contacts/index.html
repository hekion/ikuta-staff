<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>連絡先 | Ikuta-Portal</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        /* 連絡先リストのスタイル */
        .contact-section {
            margin-bottom: 30px;
        }
        .contact-group-title {
            font-size: 1rem;
            font-weight: bold;
            color: #35A0D9;
            border-bottom: 2px solid #E3F2FD;
            padding-bottom: 5px;
            margin-bottom: 15px;
        }
        .contact-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 12px 15px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .contact-name {
            font-weight: bold;
            color: #333;
        }
        .contact-number {
            font-family: monospace;
            color: #666;
            font-size: 1rem;
            /* リンクではないことを示すため、選択はできるがタップ反応はなし */
            user-select: all;
        }
        .no-number {
            color: #ccc;
            font-size: 0.8rem;
            font-style: italic;
        }
    </style>
</head>
<body>

    <div class="sticky-header">
        <header>
            <a href="../" style="text-decoration: none; display: inline-block;">
                <img src="../assets/images/ikutalogo.png" alt="FRONTOWN IKUTA">
                <div class="sub-title">STAFF PORTAL</div>
            </a>
        </header>
        <nav class="nav-menu">
            <ul>
                <li><a href="../manual/">マニュアル</a></li>
                <li><a href="../setup/">準備物</a></li>
                <li><a href="../roster/">名簿</a></li>
                <li><a href="../inventory/">備品検索</a></li>
                <li><a href="../pop/">POP</a></li>
                <li><a href="../contacts/" class="active">連絡先</a></li>
            </ul>
        </nav>
    </div>

    <main class="container">
        <section>
            <h2>連絡先一覧</h2>

            <div class="contact-section">
                <div class="contact-group-title">社員さん</div>
                
                <div class="contact-card">
                    <span class="contact-name">杉本さん</span>
                    <span class="contact-number">080-1234-5678</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">出口さん</span>
                    <span class="contact-number no-number">番号未登録</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">杉山さん</span>
                    <span class="contact-number no-number">番号未登録</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">池田さん</span>
                    <span class="contact-number no-number">番号未登録</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">大平さん</span>
                    <span class="contact-number no-number">番号未登録</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">星見さん</span>
                    <span class="contact-number no-number">番号未登録</span>
                </div>
            </div>

            <div class="contact-section">
                <div class="contact-group-title">施設など</div>
                
                <div class="contact-card">
                    <span class="contact-name">〇〇</span>
                    <span class="contact-number no-number">--</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">◻︎◻︎</span>
                    <span class="contact-number no-number">--</span>
                </div>
                
                <div class="contact-card">
                    <span class="contact-name">△△</span>
                    <span class="contact-number no-number">--</span>
                </div>
            </div>

        </section>
    </main>

    <footer>
        <p>&copy; 2026 FRONTOWN IKUTA</p>
    </footer>

</body>
</html>
