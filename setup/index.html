<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>読み込み中...</title>
    <script>
        window.onload = function() {
            const days = ['sunday', 'monday', 'tuesday', 'wednesday', 'thursday', 'friday', 'saturday'];
            const today = new Date().getDay(); // 今日が何曜日か取得
            // 例：月曜日なら monday.html へ移動
            window.location.href = days[today] + '.html';
        };
    </script>
</head>
<body>
    <p style="text-align:center; margin-top:50px; font-family:sans-serif;">今日の準備リストへ移動しています...</p>
</body>
</html>
