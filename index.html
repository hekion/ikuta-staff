<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>アルバイト業務ポータル</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>業務効率化ポータル</h1>
    </header>

    <main class="container">
        <section class="tool-links">
            <h2>管理システム</h2>
            <div class="grid">
                <a href="https://admin.hacomono.jp/" target="_blank" rel="noopener noreferrer" class="card">
                    <img src="assets/images/hacomono.png" alt="hacomono">
                    <span>hacomono 管理画面</span>
                </a>
                <a href="https://labola.jp/reserve/shop/" target="_blank" rel="noopener noreferrer" class="card">
                    <img src="assets/images/LaBOLA.png" alt="LaBOLA">
                    <span>LaBOLA 管理画面</span>
                </a>
            </div>
        </section>

        <section class="internal-links">
            <h2>業務メニュー</h2>
            <div class="grid">
                <a href="manual/" class="card menu-item">
                    <div class="icon">📖</div>
                    <span>マニュアル</span>
                </a>
                <a href="inventory/" class="card menu-item">
                    <div class="icon">🔍</div>
                    <span>備品・物品検索</span>
                </a>
                <a href="pop/" class="card menu-item">
                    <div class="icon">🖼️</div>
                    <span>POP置き場(Drive)</span>
                </a>
                <a href="contacts/" class="card menu-item">
                    <div class="icon">📞</div>
                    <span>連絡先・逆引き</span>
                </a>
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2024 施設管理ポータル</p>
    </footer>

</body>
</html>
