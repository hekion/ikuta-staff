<!DOCTYPE html>
<html lang="ja">
<head>

    <title>Ikuta-Portal</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="nav-menu">
        <ul>
            <li><a href="./">ホーム</a></li>
            <li><a href="manual/">マニュアル</a></li>

            <li><a href="contacts/">連絡先</a></li>
        </ul>

    <main class="container">
        <section class="tool-links">

            <div class="grid">

                <a href="https://yoyaku.labola.jp/r/shop/manage/top/" target="_blank" rel="noopener noreferrer" class="card">

        <section class="internal-links">

            <div class="grid">
                <a href="manual/" class="card menu-item">
                    <div class="icon">📖</div>

                <a href="inventory/" class="card menu-item">

                <a href="pop/" class="card menu-item">
                    <div class="icon">🖼️</div>
